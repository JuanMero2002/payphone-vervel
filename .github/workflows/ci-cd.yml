name: Pipeline CI/CD PayPhone

on:
  push:
    branches:
      - main
      - feature/ci-cd-luis

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build - Preparar proyecto
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Validar sintaxis de Python
        run: python -m compileall api

      - name: Comprobar que Flask puede cargar la aplicacion
        run: python -c "from api.index import app; print('Aplicacion Flask cargada correctamente')"

  test:
    name: Test - Ejecutar pruebas
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ejecutar pruebas automatizadas
        run: python -m pytest -v

  deploy:
    name: Deploy - Publicar en Vercel
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js para Vercel CLI
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Descargar configuracion de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Construir proyecto para produccion
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Desplegar proyecto en produccion
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}